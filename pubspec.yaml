name: pdftoreel
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Navigace a utility
  flutter_svg: ^2.2.3
  video_player: ^2.8.6
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  dio: ^5.9.2
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  google_sign_in: 6.2.1
  google_sign_in_web: ^0.12.3
  share_plus: ^10.1.4
  url_launcher: ^6.3.2
  web: ^1.1.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  # If you add assets later, they go here under this single flutter: key
  # assets:
  #   - assets/images/
  assets:
      - assets/icons/
      - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"