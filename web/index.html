<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PDF to Reel - Convert your PDFs into engaging video reels.">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PDF to Reel">
  <meta name="theme-color" content="#141414">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>PDF to Reel</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #141414;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background-color: #141414;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Minimal thin spinner */
    .splash-spinner {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-top-color: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Minimalist Title */
    .splash-title {
      color: rgba(255, 255, 255, 0.5);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="splash-spinner"></div>
    <div class="splash-title">PDF TO REEL</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
